server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect www → apex (handled at app layer in case proxy forwards Host)
    if ($http_host = "www.ngcapital.net") {
        return 301 https://ngcapital.net$request_uri;
    }

    # Legacy WordPress URLs → closest current equivalents (fixes GSC 404s)
    location = /index.php/about-us/meeting { return 301 /book; }
    location = /index.php/learning-center-2/loan-programs { return 301 /#services; }
    location = /index.php/home-4 { return 301 /; }
    location ~ ^/index\.php(/.*)?$ { return 301 /; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /sitemap.xml {
        add_header Content-Type application/xml;
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
